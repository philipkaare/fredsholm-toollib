app = 'fredsholm-toollib'
primary_region = 'ams'

machine_config = "fly.machines.json"

[http_service]
  internal_port = 8080
  force_https = true
  auto_stop_machines = 'stop'
  auto_start_machines = true
  min_machines_running = 1

[[vm]]
  memory = '1gb'
  cpu_kind = 'shared'
  cpus = 1

[[mounts]]
  source = 'app_data'
  destination = '/data'
