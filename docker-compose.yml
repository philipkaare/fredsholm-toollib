version: '3.8'
services:
  app:
    build: .
    ports:
      - "8080:8080"
    environment:
      ConnectionStrings__DefaultConnection: Host=postgres;Database=toollib;Username=postgres;Password=postgres123
      MongoDB__ConnectionString: mongodb://mongo:27017
      MongoDB__DatabaseName: toollib
      ASPNETCORE_ENVIRONMENT: Production
    depends_on:
      - postgres
      - mongo

  postgres:
    image: postgres:16-alpine
    environment:
      POSTGRES_DB: toollib
      POSTGRES_USER: postgres
      POSTGRES_PASSWORD: postgres123
      PGDATA: /data/postgres

  mongo:
    image: mongo:7
    entrypoint: ["sh", "-c", "mkdir -p /data/db /data/configdb && exec docker-entrypoint.sh mongod"]
