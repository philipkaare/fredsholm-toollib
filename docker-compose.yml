version: '3.8'
# Local-dev compose. Sensitive values are read from .env (gitignored).
# Production deploys go via Fly machine_config (fly.machines.json) + fly secrets.
services:
  app:
    build: .
    ports:
      - "8080:8080"
    environment:
      ConnectionStrings__DefaultConnection: Host=postgres;Database=toollib;Username=postgres;Password=${POSTGRES_PASSWORD}
      MongoDB__ConnectionString: mongodb://mongo:27017
      MongoDB__DatabaseName: toollib
      ASPNETCORE_ENVIRONMENT: Production
      AdminUser__Email: admin@toollib.dk
      AdminUser__Password: ${ADMIN_PASSWORD}
      App__BaseUrl: https://fredsholmvej.dk
      MailerSend__ApiToken: ${MAILERSEND_API_TOKEN}
      MailerSend__FromEmail: noreply@fredsholmvej.dk
      MailerSend__FromName: Fredsholmvej Værktøjsbibliotek
    depends_on:
      - postgres
      - mongo

  postgres:
    image: postgres:16-alpine
    entrypoint: ["sh", "-c", "mkdir -p /data/postgres && chown -R postgres:postgres /data/postgres && PGDATA=/data/postgres exec docker-entrypoint.sh postgres"]
    environment:
      POSTGRES_DB: toollib
      POSTGRES_USER: postgres
      POSTGRES_PASSWORD: ${POSTGRES_PASSWORD}

  mongo:
    image: mongo:7
    entrypoint: ["sh", "-c", "mkdir -p /data/db /data/configdb && exec docker-entrypoint.sh mongod"]
