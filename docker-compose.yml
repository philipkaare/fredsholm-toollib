version: '3.8'
services:
  app:
    build: ./ToolLib
    ports:
      - "8080:8080"
    environment:
      - ConnectionStrings__DefaultConnection=Host=postgres;Database=toollib;Username=postgres;Password=postgres123
      - MongoDB__ConnectionString=mongodb://mongo:27017
      - MongoDB__DatabaseName=toollib
      - AdminUser__Email=admin@toollib.dk
      - AdminUser__Password=${ADMIN_PASSWORD:?ADMIN_PASSWORD must be set}
      - ASPNETCORE_ENVIRONMENT=Production
    depends_on:
      postgres:
        condition: service_healthy
      mongo:
        condition: service_started

  postgres:
    image: postgres:16-alpine
    environment:
      POSTGRES_DB: toollib
      POSTGRES_USER: postgres
      POSTGRES_PASSWORD: postgres123
    volumes:
      - postgres_data:/var/lib/postgresql/data
    healthcheck:
      test: ["CMD-SHELL", "pg_isready -U postgres"]
      interval: 5s
      timeout: 5s
      retries: 5

  mongo:
    image: mongo:7
    volumes:
      - mongo_data:/data/db

volumes:
  postgres_data:
  mongo_data:
